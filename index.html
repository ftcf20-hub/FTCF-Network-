<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0; }
        
        #splash { 
            position: fixed; inset: 0; background: #020617; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        
        .fade-out { opacity: 0 !important; visibility: hidden !important; pointer-events: none; }

        @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fillBar { 0% { width: 0%; } 100% { width: 100%; } }
        
        .animate-text { animation: fadeSlide 1s ease-out forwards; }
        .animate-sub { animation: fadeSlide 1s ease-out 0.5s forwards; }

        .tab-content { display: none; height: 100vh; }
        .tab-content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-slate-200">

    <!-- Splash Screen -->
    <div id="splash">
        <h1 class="text-amber-500 text-6xl font-black tracking-tighter mb-2 opacity-0 animate-text">FTCF</h1>
        <p class="text-slate-400 text-sm font-medium tracking-[0.2em] uppercase opacity-0 animate-sub">Mughal Brothers Network</p>
        <div class="absolute bottom-20 w-48 h-[2px] bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-amber-500 animate-[fillBar_2.5s_ease-in-out_forwards]"></div>
        </div>
    </div>

    <!-- Bell Icon & Popup -->
    <div class="fixed top-4 right-4 z-[60]">
        <button onclick="document.getElementById('notice-popup').classList.toggle('hidden')" class="text-amber-500 text-xl p-2 bg-slate-900 rounded-full shadow-lg border border-slate-700">
            <i class="fas fa-bell"></i>
        </button>
    </div>

    <div id="notice-popup" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div class="glass p-6 rounded-2xl w-full max-w-sm border border-slate-700 shadow-2xl">
            <h2 class="text-amber-500 font-bold mb-3 flex items-center gap-2"><i class="fas fa-info-circle"></i> Important Notice</h2>
            <p id="notice-text" class="text-slate-300 text-sm mb-4">Alhamdulillah! New App Use K Liye Ready hai Jo Har Member Apne Mobile Me Asani se Install kar sakta hai.</p>
            <button onclick="document.getElementById('notice-popup').classList.add('hidden')" class="w-full py-2 bg-amber-600 hover:bg-amber-500 rounded-lg text-white font-semibold">Close</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="ledger" class="tab-content active"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
    <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
    <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
    <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>

    <nav class="fixed bottom-4 left-4 right-4 glass rounded-2xl p-3 flex justify-around items-center z-50 shadow-2xl">
        <button onclick="switchTab('ledger', this)" class="tab-btn text-amber-500 p-2"><i class="fas fa-wallet text-xl"></i></button>
        <button onclick="switchTab('monthly', this)" class="tab-btn text-slate-500 p-2"><i class="fas fa-calendar-check text-xl"></i></button>
        <button onclick="switchTab('yearly', this)" class="tab-btn text-slate-500 p-2"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="switchTab('rules', this)" class="tab-btn text-slate-500 p-2"><i class="fas fa-gavel text-xl"></i></button>
    </nav>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.classList.add('fade-out');
                setTimeout(() => splash.style.display = 'none', 800);
            }, 3000);
        });

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.className = b.className.replace('text-amber-500', 'text-slate-500'));
            document.getElementById(id).classList.add('active');
            btn.className = btn.className.replace('text-slate-500', 'text-amber-500');
        }

        let touchstartY = 0;
        document.addEventListener('touchstart', e => touchstartY = e.touches[0].clientY);
        document.addEventListener('touchend', e => {
            if (e.changedTouches[0].clientY - touchstartY > 100) {
                const activeIframe = document.querySelector('.tab-content.active iframe');
                activeIframe.src = activeIframe.src;
            }
        });
    </script>
</body>
</html>
