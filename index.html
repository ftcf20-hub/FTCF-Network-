<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Meta tags to force browser to get fresh data -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Premium Portal</title>
    
    <!-- Updated manifest link to force refresh configuration -->
    <link rel="manifest" href="manifest.json?v=3">
    
    <!-- Updated Icon Links with versioning to force refresh -->
    <link rel="apple-touch-icon" href="https://i.postimg.cc/fTY6C21N/1784308656105.jpg?v=3">
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/fTY6C21N/1784308656105.jpg?v=3">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #050505; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        
        #splash { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 1s ease; }
        .splash-logo { animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
        .fade-out { opacity: 0; visibility: hidden; transform: scale(1.2); }
        
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .glass-card { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .tab-btn.active-tab { color: #f59e0b !important; transform: translateY(-5px); }
        .tab-btn.active-tab::after { content: ''; position: absolute; bottom: 8px; left: 50%; width: 4px; height: 4px; background: #f59e0b; border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 10px #f59e0b; }
        .tab-content { display: none; height: 100vh; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="text-slate-200">
    <div id="splash">
        <div class="splash-logo text-amber-500 text-6xl font-black tracking-tighter mb-2">FTCF</div>
        <p class="text-slate-500 text-[10px] font-bold tracking-[0.4em] uppercase">Mughal Brothers Network</p>
    </div>

    <div class="fixed top-6 right-6 z-[60]">
        <button onclick="document.getElementById('notice-popup').classList.remove('hidden')" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-amber-500 hover:bg-amber-500/10 transition-all">
            <i class="fas fa-bell"></i>
        </button>
    </div>

    <div id="notice-popup" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-white text-xl font-bold mb-4">📢 System Notice</h2>
            <p class="text-slate-400 text-sm leading-relaxed mb-6">Alhamdulillah! App Updated successfully.</p>
            <button onclick="document.getElementById('notice-popup').classList.add('hidden')" class="w-full py-3 bg-amber-500 hover:bg-amber-600 rounded-xl text-black font-bold transition-all">Close</button>
        </div>
    </div>

    <div id="ledger" class="tab-content active"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
    <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
    <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
    <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-nav rounded-full px-8 py-4 flex gap-8 items-center z-50">
        <button onclick="switchTab('ledger', this)" class="tab-btn active-tab text-slate-500"><i class="fas fa-wallet text-xl"></i></button>
        <button onclick="switchTab('monthly', this)" class="tab-btn text-slate-500"><i class="fas fa-calendar-check text-xl"></i></button>
        <button onclick="switchTab('yearly', this)" class="tab-btn text-slate-500"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="switchTab('rules', this)" class="tab-btn text-slate-500"><i class="fas fa-gavel text-xl"></i></button>
    </nav>

    <script>
        window.addEventListener('load', () => setTimeout(() => document.getElementById('splash').classList.add('fade-out'), 3000));
        
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-tab');
        }
    </script>
</body>
</html>
