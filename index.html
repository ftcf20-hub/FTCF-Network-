<script>
    // Splash Screen Logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
        }, 3000);
    });

    function hideSpinner(iframe) { iframe.previousElementSibling.style.display = 'none'; }

    function switchTab(event, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'text-amber-500');
            b.classList.add('opacity-40');
        });
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active', 'text-amber-500');
        event.currentTarget.classList.remove('opacity-40');
    }

    // --- Fixed Features ---

    // Scroll aur Pull-to-refresh iframe ke andar listen karne ke liye
    const frames = document.querySelectorAll('iframe');
    frames.forEach(frame => {
        frame.addEventListener('load', function() {
            let doc = this.contentDocument;
            let lastScrollTop = 0;
            let nav = document.querySelector('nav');

            doc.addEventListener('scroll', function() {
                let st = doc.documentElement.scrollTop;
                // Bottom Nav Hiding
                if (st > lastScrollTop) {
                    nav.style.transform = "translateY(100%)";
                } else {
                    nav.style.transform = "translateY(0)";
                }
                lastScrollTop = st;
            });

            // Pull-to-Refresh
            let touchstartY = 0;
            doc.addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; });
            doc.addEventListener('touchend', e => {
                let touchendY = e.changedTouches[0].screenY;
                if (touchendY - touchstartY > 100 && doc.documentElement.scrollTop === 0) {
                    frame.src = frame.src; // Refresh
                }
            });
        });
    });
</script>
