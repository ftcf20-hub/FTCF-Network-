<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; font-family: 'Inter', sans-serif; }
        
        /* Premium Glassmorphism */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        #splash { position: fixed; inset: 0; background: #020617; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s ease; }
        .fade-out { opacity: 0; visibility: hidden; }

        /* Premium Tab Content */
        .tab-content { display: none; height: 100vh; padding-bottom: 70px; overflow-y: auto; }
        .tab-content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Pull to Refresh Indicator */
        .ptr-loader { position: absolute; top: 10px; width: 100%; text-align: center; color: #f59e0b; display: none; }
    </style>
</head>
<body class="text-slate-200">

    <!-- Splash Screen -->
    <div id="splash">
        <div class="text-amber-500 text-6xl font-bold mb-4 animate-pulse">FTCF</div>
        <div class="w-12 h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-amber-500 animate-[load_2s_ease-in-out_infinite]"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="ledger" class="tab-content active"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
    <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
    <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
    <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>

    <!-- Premium Navigation -->
    <nav class="fixed bottom-4 left-4 right-4 glass rounded-2xl p-3 flex justify-around items-center z-50 shadow-2xl">
        <button onclick="switchTab('ledger')" class="tab-btn active text-amber-500 flex flex-col items-center p-2 rounded-xl transition-all">
            <i class="fas fa-wallet text-xl"></i>
        </button>
        <button onclick="switchTab('monthly')" class="tab-btn text-slate-500 flex flex-col items-center p-2 rounded-xl transition-all">
            <i class="fas fa-calendar-check text-xl"></i>
        </button>
        <button onclick="switchTab('yearly')" class="tab-btn text-slate-500 flex flex-col items-center p-2 rounded-xl transition-all">
            <i class="fas fa-chart-line text-xl"></i>
        </button>
        <button onclick="switchTab('rules')" class="tab-btn text-slate-500 flex flex-col items-center p-2 rounded-xl transition-all">
            <i class="fas fa-gavel text-xl"></i>
        </button>
    </nav>

    <script>
        // Splash Timer
        window.addEventListener('load', () => setTimeout(() => document.getElementById('splash').classList.add('fade-out'), 2000));

        // Tab Switching
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('text-amber-500');
                b.classList.add('text-slate-500');
            });
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('text-amber-500');
        }

        // Pull to Refresh Logic
        let touchstartY = 0;
        document.addEventListener('touchstart', e => touchstartY = e.touches[0].clientY);
        document.addEventListener('touchend', e => {
            let touchendY = e.changedTouches[0].clientY;
            if (touchendY - touchstartY > 100) { // If pulled down > 100px
                const activeIframe = document.querySelector('.tab-content.active iframe');
                activeIframe.src = activeIframe.src; // Simple refresh
            }
        });
    </script>
</body>
</html>
