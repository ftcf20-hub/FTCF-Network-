<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #020617; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: #020617; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s; }
        .fade-out { opacity: 0; visibility: hidden; }

        /* Animations */
        @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fillBar { 0% { width: 0%; } 100% { width: 100%; } }
        
        .animate-text { animation: fadeSlide 1s ease-out forwards; }
        .animate-sub { animation: fadeSlide 1s ease-out 0.5s forwards; }

        /* Main Content */
        .tab-content { display: none; height: 100vh; }
        .tab-content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Nav Glassmorphism */
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-slate-200">

    <div id="splash">
        <h1 class="text-amber-500 text-6xl font-black tracking-tighter mb-2 opacity-0 animate-text">FTCF</h1>
        <p class="text-slate-400 text-sm font-medium tracking-[0.2em] uppercase opacity-0 animate-sub">Mughal Brothers Network</p>
        <div class="absolute bottom-20 w-48 h-[2px] bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-amber-500 animate-[fillBar_2.5s_ease-in-out_forwards]"></div>
        </div>
    </div>

    <div id="ledger" class="tab-content active"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
    <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
    <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
    <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>
