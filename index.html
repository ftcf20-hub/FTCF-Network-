<script>
    // Splash Screen Logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
        }, 3000);
    });

    function hideSpinner(iframe) { iframe.previousElementSibling.style.display = 'none'; }

    function switchTab(event, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('active', 'text-amber-500');
            b.classList.add('opacity-40');
        });
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active', 'text-amber-500');
        event.currentTarget.classList.remove('opacity-40');
    }

    // --- New Features ---

    // 1. Bottom Nav Hiding on Scroll
    let lastScrollTop = 0;
    window.addEventListener("scroll", function() {
        let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
        let nav = document.querySelector('nav');
        if (currentScroll > lastScrollTop) {
            nav.style.transform = "translateY(100%)"; // Hide
        } else {
            nav.style.transform = "translateY(0)"; // Show
        }
        lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
    }, false);

    // 2. Pull-to-Refresh logic
    let touchstartY = 0;
    document.addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; }, false);
    document.addEventListener('touchend', e => {
        let touchendY = e.changedTouches[0].screenY;
        if (touchendY - touchstartY > 100 && window.scrollY === 0) {
            // Refresh current active iframe
            let activeIframe = document.querySelector('.tab-content.active iframe');
            activeIframe.src = activeIframe.src;
        }
    }, false);
        </script>
